name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Windows x64
          - os: windows-latest
            python_arch: x64
            asset_name: CurseForge-Downloader-Windows-x64.exe
          # Linux x86_64
          - os: ubuntu-latest
            python_arch: x64
            asset_name: CurseForge-Downloader-Linux-x64
            archive_format: tar.gz
          # Linux ARM64
          - os: ubuntu-24.04-arm
            python_arch: arm64
            asset_name: CurseForge-Downloader-Linux-ARM64
            archive_format: tar.gz
          # macOS Apple Silicon (ARM64)
          - os: macos-latest
            python_arch: arm64
            asset_name: CurseForge-Downloader-macOS-AppleSilicon
            archive_format: zip
          # macOS Intel (x86_64)
          - os: macos-13
            python_arch: x64
            asset_name: CurseForge-Downloader-macOS-Intel
            archive_format: zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.python_arch }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ] || [ "${{ matrix.os }}" = "macos-latest" ] || [ "${{ matrix.os }}" = "macos-13" ]; then
            pyinstaller --noconsole --onefile --name "CurseForge-Downloader" cf_download.py
          else
            pyinstaller --onefile --name "CurseForge-Downloader" cf_download.py
          fi

      - name: Package Artifact
        shell: bash
        run: |
          mkdir -p release_dist
          if [ "${{ matrix.archive_format }}" = "zip" ]; then
            cd dist
            zip -r ../release_dist/${{ matrix.asset_name }}.zip CurseForge-Downloader
          elif [ "${{ matrix.archive_format }}" = "tar.gz" ]; then
            cd dist
            tar -czf ../release_dist/${{ matrix.asset_name }}.tar.gz CurseForge-Downloader
          else
            cp dist/CurseForge-Downloader.exe release_dist/${{ matrix.asset_name }}
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.asset_name }}
          path: release_dist/*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
